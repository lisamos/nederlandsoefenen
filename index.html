<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NT2 Oefeningen</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #faf9f6;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 4rem 1.5rem;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 3rem;
    }

    h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 36px;
      font-weight: 400;
      color: #1a1a1a;
      line-height: 1.15;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 15px;
      color: #888;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: #aaa;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .tools {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 3rem;
    }

    .tool-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border: 1px solid #e8e6e0;
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .tool-card:hover {
      border-color: #c0bdb5;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .tool-info { flex: 1; }

    .tool-name {
      font-size: 15px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 2px;
    }

    .tool-desc {
      font-size: 13px;
      color: #999;
    }

    .tool-arrow {
      font-size: 18px;
      color: #ccc;
      margin-left: 1rem;
      transition: transform 0.15s, color 0.15s;
    }

    .tool-card:hover .tool-arrow {
      transform: translateX(3px);
      color: #888;
    }

    .tool-tag {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 99px;
      margin-right: 0.75rem;
      background: #eef3ff;
      color: #3b5bdb;
      white-space: nowrap;
    }

    footer {
      font-size: 12px;
      color: #bbb;
    }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>NT2 Oefeningen</h1>
    <p class="subtitle">Interactieve oefeningen voor Nederlands als tweede taal</p>
  </header>

  <div class="section-label">Beschikbare oefeningen</div>
  <div class="tools">
    <a href="werkwoorden-oefenen.html" class="tool-card">
      <div class="tool-info">
        <div class="tool-name">Werkwoorden oefenen</div>
        <div class="tool-desc">Persoonsvormen in de tegenwoordige tijd</div>
      </div>
      <span class="tool-tag">A0–A1</span>
      <span class="tool-arrow">→</span>
    </a>

      <a href="kaartjes.html" class="tool-card">
      <div class="tool-info">
        <div class="tool-name">Woorden naar kaartjes</div>
        <div class="tool-desc">Maak printbare kaartjes van een woordenlijst</div>
      </div>
      <span class="tool-tag">Voor docenten</span>
      <span class="tool-arrow">→</span>
    </a>

    <!-- Toekomstige oefeningen kunnen hier worden toegevoegd -->
    <!-- Voorbeeld:
    <a href="woordvolgorde.html" class="tool-card">
      <div class="tool-info">
        <div class="tool-name">Woordvolgorde</div>
        <div class="tool-desc">Zinnen in de juiste volgorde zetten</div>
      </div>
      <span class="tool-tag">A1</span>
      <span class="tool-arrow">→</span>
    </a>
    -->
  </div>

  <footer>NT2 oefeningen &mdash; voor cursisten Nederlands</footer>
</div>
</body>
</html>
